<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>LifeLink | Forgot Password</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="auth-wrapper">
    <div class="auth-card-container" style="max-width: 500px;">
        <div class="auth-form-side" style="padding: 50px;">
            <div style="text-align: center; margin-bottom: 30px;">
                <h2 class="logo-text" style="font-size: 2rem; margin:0;">Recover Account</h2>
            </div>

            <form id="recoveryForm" onsubmit="handleRecovery(event)">
                <div class="input-group">
                    <label>Email or Phone Number</label>
                    <input type="text" id="recoveryId" placeholder="example@mail.com" required>
                </div>
                <button type="submit" class="btn-filled-full">Send Reset Link</button>
                <div style="margin-top: 20px; text-align: center;">
                    <a href="login.html" style="color: var(--text-grey); font-size: 0.85rem; text-decoration:none;">Back to Sign In</a>
                </div>
            </form>

            <div id="successState" style="display: none; text-align: center;">
                <div style="font-size: 3rem; margin-bottom: 15px;">📧</div>
                <h3>Check your inbox</h3>
                <p style="color: var(--text-grey); font-size: 0.9rem; margin-bottom: 25px;">We've sent password recovery instructions.</p>
                <button class="btn-outline-full" onclick="location.href='login.html'">Return to Login</button>
            </div>
        </div>
    </div>
    <script src="js/script.js"></script>
</body>
</html>
